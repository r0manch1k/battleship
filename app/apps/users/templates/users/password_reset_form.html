{% extends "users/base.html" %}

{% block auth_content %}
  <div class="block__header">Сброс пароля</div>

  <div class="block__main">
    <form method="post" class="auth__form">
      {% csrf_token %}

      {{ form.email.label_tag }}
      {{ form.email }}

      <button type="submit" class="button">Отправить письмо</button>
    </form>
  </div>
{% endblock %}
